<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanin-hopp ögonträning</title>
<style>

:root{
  --bg:#000;
  --show-time:3000ms;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body{
  display:grid;
  place-items:center;
}

.stage{
  width:1920px;
  height:1080px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  padding:70px;
}

.cell{
  display:flex;
}

.top{align-items:flex-start}
.middle{align-items:center}
.bottom{align-items:flex-end}

.left{justify-content:flex-start}
.center{justify-content:center}
.right{justify-content:flex-end}

.bunny{
  width:260px;
  height:230px;
  opacity:0;
  transition:opacity .2s ease;
}

.bunny.visible{
  opacity:1;
}

svg{
  width:100%;
  height:100%;
}

.circle{
  mix-blend-mode:screen;
}

.fix-cross{
  stroke:white;
  stroke-width:2;
}

.fix-ring{
  stroke:white;
  stroke-width:2;
  fill:none;
}

.hud{
  position:absolute;
  left:20px;
  bottom:20px;
  color:#aaa;
  font-size:18px;
}

@media (max-width:1920px),(max-height:1080px){
  .stage{
    transform:scale(min(calc(100vw / 1920), calc(100vh / 1080)));
    transform-origin:center;
  }
}

</style>
</head>
<body>

<div class="stage">

<div class="cell top left"></div>
<div class="cell top center"></div>
<div class="cell top right"></div>

<div class="cell middle left"></div>
<div class="cell middle center"></div>
<div class="cell middle right"></div>

<div class="cell bottom left"></div>
<div class="cell bottom center"></div>
<div class="cell bottom right"></div>

<div class="hud">Space=start/paus • F=fullscreen</div>

</div>

<template id="bunny-template">
<div class="bunny visible">

<!--
RGB-cirklar i 60° triangel.
Fixationskors + liten vit ring i exakt centrum
för att hjälpa ögonen att konvergera.
-->

<svg viewBox="0 0 260 230">

<!-- RGB triangeln -->
<circle class="circle" cx="130" cy="45" r="80" fill="rgb(0,0,255)" />
<circle class="circle" cx="60" cy="160" r="80" fill="rgb(255,0,0)" />
<circle class="circle" cx="200" cy="160" r="80" fill="rgb(0,255,0)" />

<!-- Fixationscentrum -->
<circle class="fix-ring" cx="130" cy="120" r="8" />

<line class="fix-cross" x1="130" y1="112" x2="130" y2="128" />
<line class="fix-cross" x1="122" y1="120" x2="138" y2="120" />

</svg>

</div>
</template>

<script>

const SHOW_MS = 3000

const cells=[...document.querySelectorAll('.cell')]
const template=document.getElementById('bunny-template')

const centerCell=cells[4] // B2

let running=true
let currentCell=null
let currentBunny=null

function pickNext(){

// 40% chans att använda mittenrutan
if(Math.random()<0.4) return centerCell

const choices=cells.filter(c=>c!==currentCell)

return choices[Math.floor(Math.random()*choices.length)]

}

function clearCurrent(){

if(currentBunny){
currentBunny.remove()
currentBunny=null
}

}

function place(){

if(!running) return

clearCurrent()

currentCell=pickNext()

currentBunny=template.content.firstElementChild.cloneNode(true)

currentCell.appendChild(currentBunny)

setTimeout(place,SHOW_MS)

}

function toggle(){

running=!running

if(running) place()
else clearCurrent()

}

async function fullscreen(){

if(!document.fullscreenElement)
await document.documentElement.requestFullscreen()
else
await document.exitFullscreen()

}

document.addEventListener('keydown',e=>{

if(e.code==='Space'){
 e.preventDefault()
 toggle()
}

if(e.key==='f'||e.key==='F') fullscreen()

})

place()

</script>

</body>
</html>
