<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanin-hopp ögonträning</title>
  <style>
    :root {
      --bg: #000;
      --size: 220px;
      --overlap: 42px;
      --show-time: 3000ms;
      --hide-time: 250ms;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: #000;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      padding: 48px 64px;
      gap: 0;
      transform-origin: center center;
    }

    .cell {
      position: relative;
      display: flex;
      pointer-events: none;
    }

    .top { align-items: flex-start; }
    .middle { align-items: center; }
    .bottom { align-items: flex-end; }

    .left { justify-content: flex-start; }
    .center { justify-content: center; }
    .right { justify-content: flex-end; }

    .bunny {
      position: relative;
      width: calc(var(--size) + var(--size) - var(--overlap));
      height: calc(var(--size) + var(--size) - var(--overlap));
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .bunny.visible {
      opacity: 1;
      transform: scale(1);
    }

    .circle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: saturate(1.2);
    }

    .red {
      left: 0;
      top: calc((var(--size) - (var(--size) - var(--overlap))) / 2);
      background: rgb(255, 0, 0);
    }

    .green {
      left: calc(var(--size) - var(--overlap));
      top: calc((var(--size) - (var(--size) - var(--overlap))) / 2);
      background: rgb(0, 255, 0);
    }

    .blue {
      left: calc((var(--size) - var(--overlap)) / 2);
      top: 0;
      background: rgb(0, 0, 255);
    }

    .hud {
      position: absolute;
      left: 20px;
      bottom: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      user-select: none;
      letter-spacing: 0.03em;
    }

    @media (max-width: 1920px), (max-height: 1080px) {
      .stage {
        transform: scale(min(calc(100vw / 1920), calc(100vh / 1080)));
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="cell top left" data-pos="A1"></div>
    <div class="cell top center" data-pos="A2"></div>
    <div class="cell top right" data-pos="A3"></div>

    <div class="cell middle left" data-pos="B1"></div>
    <div class="cell middle center" data-pos="B2"></div>
    <div class="cell middle right" data-pos="B3"></div>

    <div class="cell bottom left" data-pos="C1"></div>
    <div class="cell bottom center" data-pos="C2"></div>
    <div class="cell bottom right" data-pos="C3"></div>

    <div class="hud">Mellanslag = start/paus • F = fullscreen • R = ny plats direkt</div>
  </div>

  <template id="bunny-template">
    <div class="bunny visible" aria-label="kaninen">
      <div class="circle red"></div>
      <div class="circle green"></div>
      <div class="circle blue"></div>
    </div>
  </template>

  <script>
    const SHOW_MS = 3000;
    const HIDE_MS = 250;
    const cells = [...document.querySelectorAll('.cell')];
    const template = document.getElementById('bunny-template');

    let running = true;
    let currentCell = null;
    let currentBunny = null;
    let timer = null;

    function pickNextCell() {
      const choices = cells.filter(c => c !== currentCell);
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function clearCurrent() {
      if (currentBunny) {
        currentBunny.classList.remove('visible');
        const bunnyToRemove = currentBunny;
        setTimeout(() => bunnyToRemove.remove(), 180);
        currentBunny = null;
      }
    }

    function placeBunny() {
      if (!running) return;

      clearCurrent();
      currentCell = pickNextCell();
      currentBunny = template.content.firstElementChild.cloneNode(true);
      currentCell.appendChild(currentBunny);

      timer = setTimeout(() => {
        clearCurrent();
        timer = setTimeout(placeBunny, HIDE_MS);
      }, SHOW_MS);
    }

    function restartNow() {
      clearTimeout(timer);
      clearCurrent();
      timer = setTimeout(placeBunny, 50);
    }

    function toggleRunning() {
      running = !running;
      clearTimeout(timer);
      if (running) {
        restartNow();
      } else {
        clearCurrent();
      }
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleRunning();
      }
      if (e.key.toLowerCase() === 'f') {
        toggleFullscreen().catch(() => {});
      }
      if (e.key.toLowerCase() === 'r') {
        restartNow();
      }
    });

    placeBunny();
  </script>
</body>
</html>
